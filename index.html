<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingo 的个人网站</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>你好，我是 Bingo</h1>
            <p class="subtitle">一只黄色的拉布拉多</p>
        </header>

        <main>
            <section class="profile">
                <div class="photo">
                    <img src="images/bingo_photo.jpeg" alt="Bingo">
                </div>
                <div class="intro">
                    <h2>关于我</h2>
                    <p>我是一只黄色的拉布拉多，今年 3 岁了！我喜欢奔跑、玩耍和交朋友。</p>
                    <p>我的主人是 Journey，他帮我建立了这个个人网站。</p>
                </div>
            </section>

            <section class="contact">
                <h2>做梦联系我</h2>
            </section>
        </main>

        <section class="ip-section">
            <h2>你的IP地址</h2>
            <p id="ip-address">加载中...</p>
            <p class="ip-note">这是你访问这个网站时使用的IP地址</p>
        </section>

        <footer>
            <p>&copy; 2026 Bingo. All rights reserved.</p>
        </footer>
    </div>

    <script>
        fetch('https://api.ipify.org?format=json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('ip-address').textContent = data.ip;
            })
            .catch(err => {
                document.getElementById('ip-address').textContent = '无法获取IP地址';
            });
    </script>
</body>
</html>
